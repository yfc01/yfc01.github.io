<style>
    .folder-title {
        cursor: pointer;
        font-size: 1.2em; /* 文件夹标题字体大小 */
        color: #000; /* 文件夹标题颜色 */
        margin: 10px 0; /* 上下间距 */
        transition: color 0.3s; /* 颜色过渡效果 */
    }

    ul {
        list-style-type: none; /* 去掉所有列表项的标记 */
        padding: 0; /* 去掉默认的内边距 */
        margin: 0; /* 去掉默认的外边距 */
    }

    .sub-directory {
        padding-left: 20px; /* 子目录缩进 */
        max-height: 0; /* 初始高度为0，隐藏内容 */
        overflow: hidden; /* 隐藏溢出内容 */
    }

    .sub-directory.visible {
        max-height: 500px; /* 设置一个合理的最大高度，确保内容能完全显示 */
    }

    .sub-directory a {
        display: block; /* 使链接占满整行 */
        padding: 8px 0; /* 上下间距 */
        font-size: 1em; /* 文章标题字体大小 */
        color: #333; /* 文章标题颜色 */
        text-decoration: none; /* 去掉下划线 */
        transition: background-color 0.3s; /* 背景颜色过渡效果 */
    }

    .sub-directory a:hover {
        background-color: #e0e0e0; /* 鼠标悬停背景颜色 */
    }

    .directory-item {
        margin-bottom: 10px; /* 每个目录项的底部间距 */
    }
</style>

<!-- partials/directory.html -->
{{ $pages := . }}

{{ if $pages }}
<ul style="padding-left: 20px;">
    {{ range $pages }}
    <li>
        <div class="directory-item">
            {{ if .IsSection }} <!-- 判断是否为文件夹 -->
            <div class="folder-title" onclick="toggleVisibility(this)">{{ .Title }}</div>
            <ul class="sub-directory"> <!-- 默认隐藏子目录 -->
                {{ if .Pages }}
                {{ partial "directory-structure.html" .Pages }} <!-- 递归调用 -->
                {{ end }}
            </ul>
            {{ else }} <!-- 否则就是文章 -->
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            {{ end }}
        </div>
    </li>
    {{ end }}
</ul>
{{ end }}

<script>
    function toggleVisibility(element) {
        const subDirectory = element.nextElementSibling; // 获取下一个兄弟元素
        if (subDirectory) {
            // 切换显示状态
            subDirectory.classList.toggle("visible"); // 切换可见性类
        }
    }
</script>
