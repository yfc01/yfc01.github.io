# -------------------------------
# 基本配置
# -------------------------------
baseURL: https://yfc01.github.io  # 博客的基本 URL
languageCode: zh-cn                # 默认语言为中文简体
title: Thoughts and Musings        # 博客的标题
theme: hugo-PaperMod               # 使用的主题

# -------------------------------
# 功能开关
# -------------------------------
enableInlineShortcodes: true       # 启用内联短代码功能（更灵活地嵌入 HTML）
enableEmoji: true                  # 支持 Emoji 表情
enableRobotsTXT: true              # 允许搜索引擎爬取博客内容
hasCJKLanguage: true               # 支持 CJK（中文、日文、韩文等）

# -------------------------------
# 构建设置
# -------------------------------
buildDrafts: false                 # 不构建草稿文章
buildFuture: false                 # 不构建未来的文章
buildExpired: false                # 不构建过期文章

# -------------------------------
# 分页设置
# -------------------------------
pagination:
  pagerSize: 10                    # 每页显示 10 篇文章

# -------------------------------
# 最小化设置
# -------------------------------
minify:
  disableXML: true                 # 禁用 XML 最小化

# -------------------------------
# URL 形式设置
# -------------------------------
permalinks:
  post: "/:title/"                 # 文章链接格式为 /:title/

# -------------------------------
# 语言及本地化设置
# -------------------------------
defaultContentLanguage: zh          # 默认内容语言为中文
defaultContentLanguageInSubdir: false  # 默认语言内容不在子目录中

languages:
  zh:
    languageName: "中文"             # 语言名称
    weight: 1                        # 语言权重（排序时优先显示）
    taxonomies:
      category: categories
      tag: tags
    params:
      homeInfoParams:
        Title: "😊 Hey Everyone!"          # 首页个人介绍标题
        Content: >
          在某一天，我突发灵感，决定建立这个博客，旨在分享我的一些笔记和创作灵感。
          在这个快速变化的世界中，坚持是成功的关键。正如伟大的作家约翰·格林所说：
          “创作是一种坚持，是一种信念。”希望我的分享能给你带来启发和帮助，让我们
          一起在这条学习与成长的道路上前行！

    # ---------------------------
    # 导航菜单配置
    # ---------------------------
    menu:
      main:
        - name: 首页
          pageRef: /
          weight: 1
        - name: 分类
          pageRef: categories/
          weight: 3
        - name: 标签
          pageRef: tags/
          weight: 4
        - name: 归档
          pageRef: archives/
          weight: 10
        - name: 搜索
          pageRef: search/
          weight: 20
        - name: 关于
          pageRef: about/
          weight: 21

# -------------------------------
# 输出格式配置
# -------------------------------
outputs:
  home:
    - HTML                           # 首页输出 HTML 格式
    - RSS                            # 支持 RSS 输出
    - JSON                           # 支持 JSON 输出

# -------------------------------
# 自定义参数配置
# -------------------------------
params:
  env: production                    # 设为生产环境
  author: yfc01                      # 博主姓名
  defaultTheme: auto                 # 默认主题模式
  disableThemeToggle: false          # 启用主题切换
  DateFormat: "2006-01-02"           # 日期格式
  ShowShareButtons: true             # 显示分享按钮
  ShowReadingTime: true              # 显示阅读时间
  ShowWordCounts: true               # 显示字数统计
  VisitCount: true                   # 显示访问计数
  ShowLastMod: true                  # 显示最后修改时间
  ShowToc: true                      # 显示目录
  TocOpen: false                     # 目录默认不展开
  comments: true                     # 启用评论功能

  # -----------------------------
  # Giscus 评论配置
  # -----------------------------
  giscus:
    repo: "yfc01/yfc01.github.io"
    repoId: "R_kgDOM33idg"
    category: "Announcements"
    categoryId: "DIC_kwDOM33ids4Ci1Si"
    mapping: "pathname"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    lightTheme: "light"
    darkTheme: "dark"
    lang: "zh-CN"
    crossorigin: "anonymous"

  # -----------------------------
  # 社交媒体图标配置
  # -----------------------------
  socialIcons:
    - name: github
      url: "https://github.com/yfc01"
    - name: QQ
      url: "img/qq.jpg"
    - name: WeChat
      url: "img/wechat.jpg"
    - name: email
      url: "mailto:2063454530@qq.com"

  # -----------------------------
  # 网站图标配置
  # -----------------------------
  assets:
    favicon: "img/active.jpg"
    favicon16x16: "img/active.jpg"
    favicon32x32: "img/active.jpg"
    apple_touch_icon: "img/active.jpg"
    safari_pinned_tab: "img/active.jpg"
    disableFingerprinting: true

  # -----------------------------
  # 页面库配置（JavaScript 特效）
  # -----------------------------
  page:
    library:
      js:
        live2d_min1: "/js/live2d_min1.js"
        canvas_sphere: "/js/canvas_sphere.js"
        anime_min: "/js/anime.min.js"
        fireworks: "/js/fireworks.js"
        live2d_min2: "/js/live2d_min2.js"

# -------------------------------
# Markdown 渲染设置
# -------------------------------
markup:
  goldmark:
    renderer:
      unsafe: true                      # 启用不安全 HTML 渲染
  highlight:
    guessSyntax: false
    codeFences: true
    noClasses: false
    lineNos: false

# -------------------------------
# 隐私设置
# -------------------------------
privacy:
  vimeo:
    disabled: false
    simple: true
  twitter:
    disabled: false
    enableDNT: true
    simple: true
  instagram:
    disabled: false
    simple: true
  youtube:
    disabled: false
    privacyEnhanced: true

# -------------------------------
# 服务设置
# -------------------------------
services:
  instagram:
    disableInlineCSS: true
  twitter:
    disableInlineCSS: true
